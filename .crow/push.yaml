variables:
  platforms: &platforms
    - name: codeberg
      enabled: true
      organization: openhub
      repository: push
      url: ssh://git@codeberg.org/openhub/push.git
      ssh_key:
        from_secret: ssh_key
      remote_name: codeberg
    - name: github
      enabled: true
      organization: togo-soft
      repository: crow-push
      url: git@github.com:togo-soft/crow-push.git
      ssh_key:
        from_secret: ssh_key
      remote_name: github
    - name: cnb
      enabled: true
      organization: codedataset
      repository: crow-push
      url: https://cnb.cool/codedataset/crow-push
      remote_name: cnb
      username: cnb
      token:
        from_secret: cnb_token
    - name: gitee
      enabled: true
      organization: codedataset
      repository: crow-push
      url: https://gitee.com/codedataset/crow-push.git
      remote_name: gitee
      username: xuthus5
      password:
        from_secret: gitee_password
    - name: sourcehut
      enabled: true
      organization: ~xuthus5
      repository: crow-push
      url: git@git.sr.ht:~xuthus5/crow-push
      remote_name: sourcehut
      ssh_key:
        from_secret: ssh_key
    - name: bitbucket
      enabled: true
      organization: xuthus5
      repository: crow-push
      url: git@bitbucket.org:xuthus5/crow-push.git
      remote_name: bitbucket
      ssh_key:
        from_secret: ssh_key

when:
  - event: [ push, pull_request, tag ]

clone:
  git:
    image: codeberg.org/crow-plugins/clone:1.0.3
    settings:
      tags: true

steps:
  push:
    image: golang:1.26
    environment:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: 0
      SSH_KNOWN_HOSTS: ""
      PLUGIN_PLATFORMS: *platforms
      PLUGIN_ACCESS_TOKEN:
        from_secret: codefloe_packages_token
    commands:
      - mkdir -p build
      - go mod tidy && go build -o build/push .
      - chmod +x build/push && build/push
