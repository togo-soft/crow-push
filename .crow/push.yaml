when:
  - event: [push, pull_request, tag]

clone:
  git:
    image: codeberg.org/crow-plugins/clone:1.0.3
    settings:
      tags: true

steps:
  push:
    image: codefloe.com/actions/push:v0.0.3
    settings:
      access_token:
        from_secret: codefloe_packages_token
      ssh_key:
        from_secret: ssh_key
      ssh_key_passphrase:
        from_secret: ssh_key_passphrase
      platforms:
        - name: codeberg
          enabled: true
          organization: openhub
          repository: push
          url: https://codeberg.org/openhub/push.git
          ssh_key: ${PLUGIN_SSH_KEY}
          ssh_key_passphrase: ${PLUGIN_SSH_PASSPHRASE}
          token: b8d8e09f6c21abf24d0c39bce66aba90b8eb8a18
          remote_name: codeberg
