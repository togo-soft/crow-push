variables:
  - &buildx_plugin 'codefloe.com/crow-plugins/docker-buildx:2.2.0'
  - &platforms_release 'linux/amd64'
  - &build_args 'CI_COMMIT_SHA=${CI_COMMIT_SHA},CI_COMMIT_TAG=${CI_COMMIT_TAG}'

  - publish_logins: &publish_logins
      - registry: https://codefloe.com
        username: xuthus5
        password:
          from_secret: codefloe_packages_token
  - &publish_repo 'codefloe.com/actions/push'

when:
  - event: [tag]

clone:
  git:
    image: codeberg.org/crow-plugins/clone:1.0.3
    settings:
      tags: true

steps:
  release-build:
    image: *buildx_plugin
    settings:
      repo: *publish_repo
      platforms: *platforms_release
      tag: ${CI_COMMIT_TAG}
      logins: *publish_logins
      build_args: *build_args
